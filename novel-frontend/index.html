<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <!-- 移动端视口：禁用缩放，覆盖安全区域 -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no, maximum-scale=1.0" />
    <!-- 主题色：浅色/深色模式自适应，PWA 状态栏使用 -->
    <meta name="theme-color" content="#f5f5f5" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#1a1a1a" media="(prefers-color-scheme: dark)" />
    <meta name="description" content="Canvas Novel Reader - 沉浸式网页小说阅读器" />
    <!-- iOS Safari: 添加到主屏幕，全屏运行 -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Canvas Reader" />
    <!-- Android Chrome: 添加到主屏幕 -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="application-name" content="Canvas Reader" />
    <!-- 禁止电话号码自动检测 -->
    <meta name="format-detection" content="telephone=no" />
    <!-- PWA 图标 -->
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <link rel="apple-touch-icon" href="/vite.svg" />
    <title>Canvas Reader</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body, #root {
        width: 100%; height: 100%;
        overflow: hidden;
        /* 禁用点击高亮 */
        -webkit-tap-highlight-color: transparent;
        /* 禁止长按弹出菜单 */
        -webkit-touch-callout: none;
        /* 禁止文本选择 */
        -webkit-user-select: none;
        user-select: none;
        /* 触摸操作优化：禁用双击缩放和手势导航 */
        touch-action: manipulation;
        /* 避免浏览器在后台时丢弃渲染状态 */
        -webkit-backface-visibility: hidden;
        backface-visibility: hidden;
        /* 字体：优先系统字体，保证加载速度 */
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Noto Sans SC', sans-serif;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
